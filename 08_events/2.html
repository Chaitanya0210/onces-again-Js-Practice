<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async</title>
</head>
<body>
    <h1>Chaitnya Rayewar</h1>
    <button id="stop">Stop</button>


    <script>
        setTimeout(function(){
            console.log("Chaitanya Rayewar");
        },2000);

        setTimeout(function(){
            document.querySelector('h1').innerHTML = "King of World"
        },2000)

    </script>
</body>
</html>
